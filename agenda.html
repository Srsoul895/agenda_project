<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 25px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .calendar {
            width: 100%;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .calendar-header button:hover {
            background: #764ba2;
        }

        .calendar-header h3 {
            color: #333;
            font-size: 1.3em;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            padding: 10px;
            font-size: 0.9em;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            background: #f9f9f9;
        }

        .day:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .day.other-month {
            color: #ccc;
            background: #fafafa;
        }

        .day.today {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .day.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .day.has-event::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border-radius: 50%;
            bottom: 5px;
        }

        .day {
            position: relative;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="time"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="time"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .events-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .event-item {
            background: #f9f9f9;
            padding: 12px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .event-item.today {
            border-left-color: #ff6b6b;
            background: #fff5f5;
        }

        .event-content {
            flex: 1;
        }

        .event-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .event-time {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 3px;
        }

        .event-description {
            font-size: 0.85em;
            color: #888;
        }

        .event-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .event-delete:hover {
            background: #ff5252;
        }

        .no-events {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .today-button {
            background: #ff6b6b;
            color: white;
            margin-left: 10px;
        }

        .today-button:hover {
            background: #ff5252;
        }

        .selected-date-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .selected-date-info p {
            color: #333;
            margin: 5px 0;
        }

        .selected-date-info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <h1>📅 Minha Agenda</h1>

    <div class="container">
        <!-- Calendário -->
        <div class="card">
            <h2>Calendário</h2>
            <div class="calendar">
                <div class="calendar-header">
                    <button id="prevMonth">← Anterior</button>
                    <h3 id="monthYear"></h3>
                    <button id="nextMonth">Próximo →</button>
                    <button class="today-button" id="todayBtn">Hoje</button>
                </div>
                <div class="weekdays">
                    <div class="weekday">Dom</div>
                    <div class="weekday">Seg</div>
                    <div class="weekday">Ter</div>
                    <div class="weekday">Qua</div>
                    <div class="weekday">Qui</div>
                    <div class="weekday">Sex</div>
                    <div class="weekday">Sab</div>
                </div>
                <div class="days" id="calendarDays"></div>
            </div>
        </div>

        <!-- Formulário e Eventos -->
        <div class="card">
            <h2>Novo Compromisso</h2>
            
            <div class="selected-date-info" id="selectedDateInfo" style="display: none;">
                <p>Data selecionada: <strong id="selectedDateText"></strong></p>
            </div>

            <form id="eventForm">
                <div class="form-group">
                    <label for="eventDate">Data</label>
                    <input type="date" id="eventDate" required>
                </div>

                <div class="form-group">
                    <label for="eventTime">Horário</label>
                    <input type="time" id="eventTime" required>
                </div>

                <div class="form-group">
                    <label for="eventTitle">Título</label>
                    <input type="text" id="eventTitle" placeholder="Ex: Reunião com cliente" required>
                </div>

                <div class="form-group">
                    <label for="eventDescription">Descrição (opcional)</label>
                    <textarea id="eventDescription" placeholder="Detalhes do compromisso..."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Adicionar Compromisso</button>
                    <button type="reset" class="btn-secondary">Limpar</button>
                </div>
            </form>

            <h2 style="margin-top: 30px;">Próximos Compromissos</h2>
            <div class="events-list" id="eventsList">
                <div class="no-events">Nenhum compromisso agendado</div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let events = [];

        // Carregar eventos do localStorage
        function loadEvents() {
            const saved = localStorage.getItem('agendaEvents');
            events = saved ? JSON.parse(saved) : [];
        }

        // Salvar eventos no localStorage
        function saveEvents() {
            localStorage.setItem('agendaEvents', JSON.stringify(events));
        }

        // Inicializar data
        function initializeDate() {
            const today = new Date();
            document.getElementById('eventDate').valueAsDate = today;
            selectedDate = new Date(today);
            updateSelectedDateInfo();
        }

        // Atualizar informações da data selecionada
        function updateSelectedDateInfo() {
            if (selectedDate) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const dateStr = selectedDate.toLocaleDateString('pt-BR', options);
                document.getElementById('selectedDateText').textContent = dateStr;
                document.getElementById('selectedDateInfo').style.display = 'block';
            }
        }

        // Renderizar calendário
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthYear').textContent = 
                new Date(year, month).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            // Dias do mês anterior
            for (let i = prevLastDay.getDate() - firstDay.getDay() + 1; i <= prevLastDay.getDate(); i++) {
                const day = createDayElement(i, true);
                calendarDays.appendChild(day);
            }

            // Dias do mês atual
            for (let i = 1; i <= lastDay.getDate(); i++) {
                const day = createDayElement(i, false, year, month);
                calendarDays.appendChild(day);
            }

            // Dias do próximo mês
            for (let i = 1; i <= (42 - firstDay.getDay() - lastDay.getDate()); i++) {
                const day = createDayElement(i, true);
                calendarDays.appendChild(day);
            }
        }

        // Criar elemento de dia
        function createDayElement(dayNum, isOtherMonth, year, month) {
            const day = document.createElement('div');
            day.className = 'day';
            day.textContent = dayNum;

            if (isOtherMonth) {
                day.classList.add('other-month');
            } else {
                const date = new Date(year, month, dayNum);
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                if (date.getTime() === today.getTime()) {
                    day.classList.add('today');
                }

                if (selectedDate && date.getTime() === selectedDate.getTime()) {
                    day.classList.add('selected');
                }

                // Verificar se há eventos neste dia
                if (hasEventsOnDate(date)) {
                    day.classList.add('has-event');
                }

                day.addEventListener('click', () => selectDate(date));
            }

            return day;
        }

        // Verificar se há eventos em uma data
        function hasEventsOnDate(date) {
            return events.some(event => {
                const eventDate = new Date(event.date);
                return eventDate.toDateString() === date.toDateString();
            });
        }

        // Selecionar data
        function selectDate(date) {
            selectedDate = new Date(date);
            document.getElementById('eventDate').valueAsDate = selectedDate;
            updateSelectedDateInfo();
            renderCalendar();
            renderEvents();
        }

        // Renderizar eventos
        function renderEvents() {
            const eventsList = document.getElementById('eventsList');
            const sortedEvents = [...events].sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateA - dateB;
            });

            if (sortedEvents.length === 0) {
                eventsList.innerHTML = '<div class="no-events">Nenhum compromisso agendado</div>';
                return;
            }

            eventsList.innerHTML = sortedEvents.map((event, index) => {
                const eventDate = new Date(event.date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const isToday = eventDate.toDateString() === today.toDateString();

                const dateStr = eventDate.toLocaleDateString('pt-BR', { 
                    weekday: 'short', 
                    day: '2-digit', 
                    month: '2-digit' 
                });

                return `
                    <div class="event-item ${isToday ? 'today' : ''}">
                        <div class="event-content">
                            <div class="event-title">${event.title}</div>
                            <div class="event-time">📅 ${dateStr} às ${event.time}</div>
                            ${event.description ? `<div class="event-description">${event.description}</div>` : ''}
                        </div>
                        <button class="event-delete" onclick="deleteEvent(${index})">Deletar</button>
                    </div>
                `;
            }).join('');
        }

        // Adicionar evento
        document.getElementById('eventForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const event = {
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                title: document.getElementById('eventTitle').value,
                description: document.getElementById('eventDescription').value
            };

            events.push(event);
            saveEvents();
            renderCalendar();
            renderEvents();
            document.getElementById('eventForm').reset();
            initializeDate();
        });

        // Deletar evento
        function deleteEvent(index) {
            if (confirm('Tem certeza que deseja deletar este compromisso?')) {
                events.splice(index, 1);
                saveEvents();
                renderCalendar();
                renderEvents();
            }
        }

        // Navegação do calendário
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date();
            selectDate(new Date());
            renderCalendar();
        });

        // Inicializar
        loadEvents();
        initializeDate();
        renderCalendar();
        renderEvents();
    </script>
</body>
</html>
